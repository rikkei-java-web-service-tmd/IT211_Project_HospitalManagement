<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management - Register</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>

<div class="mini-container">
    <h1 class="text-center">NEW PATIENT</h1>
    <p class="text-center mb-8">Register a new patient account.</p>

    <div id="error-msg" class="alert alert-error" style="display: none;"></div>
    <div id="success-msg" class="alert" style="display: none; border-color: #00cc66; color: #00cc66; background: rgba(0,204,102,0.05);">
        Registration successful! Redirecting...
    </div>

    <form id="register-form">
        <div class="form-group">
            <label for="username">Username (Min 3 chars)</label>
            <input type="text" id="username" required minlength="3">
        </div>
        <div class="form-group">
            <label for="password">Password (Min 6 chars)</label>
            <input type="password" id="password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-block">REGISTER ACCOUNT</button>
    </form>
    
    <div class="text-center mt-4" style="font-size: 0.875rem;">
        <a href="/" style="color: var(--text-muted); text-decoration: none;">BACK TO LOGIN</a>
    </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'REGISTERING...';
    btn.disabled = true;

    const errorDiv = document.getElementById('error-msg');
    const successDiv = document.getElementById('success-msg');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/api/v1/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (!response.ok) {
            let errMsg = result.message || 'Registration failed';
            // Validation errors are usually in result.data if handled globally
            if(result.data && typeof result.data === 'object') {
                 errMsg += ': ' + Object.values(result.data).join(', ');
            }
            throw new Error(errMsg);
        }

        successDiv.style.display = 'block';
        setTimeout(() => {
            window.location.href = '/';
        }, 1500);

    } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        btn.textContent = 'REGISTER ACCOUNT';
        btn.disabled = false;
    }
});
</script>

</body>
</html>
