<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management - Login</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>

<div class="mini-container">
    <h1 class="text-center">SYSTEM LOGIN</h1>
    <p class="text-center mb-8">Access the Hospital Management Portal.</p>

    <div id="error-msg" class="alert alert-error" style="display: none;"></div>

    <form id="login-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-block">ACCESS ACCOUNT</button>
    </form>
    
    <div class="text-center mt-4" style="font-size: 0.875rem;">
        <a href="/register" style="color: var(--text-muted); text-decoration: none;">CREATE PATIENT ACCOUNT</a>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'AUTHENTICATING...';
    btn.disabled = true;

    const errorDiv = document.getElementById('error-msg');
    errorDiv.style.display = 'none';

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (!response.ok) {
            throw new Error(result.message || 'Login failed');
        }

        // Store tokens
        localStorage.setItem('accessToken', result.data.accessToken);
        localStorage.setItem('refreshToken', result.data.refreshToken);

        // Decode JWT to get role (simple base64 decode of payload)
        const tokenParts = result.data.accessToken.split('.');
        const payload = JSON.parse(atob(tokenParts[1]));
        const role = payload.role; // Assuming role is in token payload, else we need user info API

        if (role === 'PATIENT' || role === 'ROLE_PATIENT') {
            window.location.href = '/patient-dashboard';
        } else {
            window.location.href = '/doctor-dashboard'; // Doctor and Admin share this for now
        }
    } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        btn.textContent = 'ACCESS ACCOUNT';
        btn.disabled = false;
    }
});

// Auto-redirect if already logged in
window.onload = () => {
    const token = localStorage.getItem('accessToken');
    if (token) {
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.role === 'PATIENT' || payload.role === 'ROLE_PATIENT') window.location.href = '/patient-dashboard';
            else window.location.href = '/doctor-dashboard';
        } catch (e) {
            localStorage.removeItem('accessToken');
        }
    }
};
</script>

</body>
</html>
